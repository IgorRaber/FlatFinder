<div class="content-header">
  <div>
    <h1>{{ isEditMode ? 'Edit flat' : 'New flat' }}</h1>
    <p>
      {{ isEditMode
        ? 'Update your property information.'
        : 'Fill in the details to add a new property.' }}
    </p>
  </div>

  <button mat-stroked-button routerLink="/home">
    Back to Home
  </button>
</div>

<div class="filters-card">
  <div
    *ngIf="message"
    class="form-message"
    [ngClass]="messageType"
  >
    {{ message }}
  </div>

  <form (ngSubmit)="onSubmit()">
    <div class="form-grid">
      <mat-form-field appearance="outline">
        <mat-label>City</mat-label>
        <input matInput [(ngModel)]="city" name="city" required />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Street name</mat-label>
        <input matInput [(ngModel)]="streetName" name="streetName" required />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Street number</mat-label>
        <input matInput [(ngModel)]="streetNumber" name="streetNumber" required />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Area size</mat-label>
        <input matInput type="number" [(ngModel)]="areaSize" name="areaSize" required />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Year built</mat-label>
        <input matInput type="number" [(ngModel)]="yearBuilt" name="yearBuilt" required />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Rent price</mat-label>
        <input matInput type="number" [(ngModel)]="rentPrice" name="rentPrice" required />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Available date</mat-label>
        <input matInput type="date" [(ngModel)]="dateAvailable" name="dateAvailable" required />
      </mat-form-field>

      <div class="checkbox-card">
        <mat-checkbox [(ngModel)]="hasAC" name="hasAC">
          Has air conditioning
        </mat-checkbox>
      </div>
    </div>

    <div class="filters-actions form-actions">
      <div class="left-actions">
        <button
          *ngIf="isEditMode"
          mat-stroked-button
          color="warn"
          type="button"
          (click)="deleteFlat()"
        >
          Delete
        </button>
      </div>

      <div class="right-actions">
        <button mat-stroked-button type="button" routerLink="/my-flats">
          Cancel
        </button>

        <button mat-raised-button color="primary" type="submit">
          {{ isEditMode ? 'Save changes' : 'Create flat' }}
        </button>
      </div>
    </div>
  </form>
</div>
